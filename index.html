<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Royal Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #1a1a2e;
            --bg-color: #f0f2f5;
            --text-dark: #333;
            --white: #ffffff;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* --- Sidebar & Header --- */
        header {
            background-color: var(--secondary-color);
            color: var(--white);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* --- Dashboard Layout --- */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--white);
            border: 2px solid transparent;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: var(--secondary-color);
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }

        /* --- Tab Content Sections --- */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Upload Section Style --- */
        .upload-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
        }

        .upload-card h2 { color: var(--secondary-color); margin-bottom: 25px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 8px; color: #555; }
        
        select, input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; outline: none; font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
        }

        .file-upload-wrapper {
            position: relative; border: 2px dashed #ccc; border-radius: 10px;
            padding: 30px; text-align: center; background: #fafafa; transition: 0.3s;
        }
        .file-upload-wrapper:hover { border-color: var(--primary-color); }
        .file-upload-wrapper input[type="file"] {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .file-upload-wrapper i { font-size: 40px; color: var(--primary-color); margin-bottom: 10px; }

        .preview-container {
            margin-top: 20px; text-align: center; display: none;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .preview-container img, .preview-container video {
            width: 100px; height: 100px; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-submit {
            background-color: var(--secondary-color); color: var(--white); font-weight: bold;
            padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer;
            font-size: 16px; margin-top: 20px; transition: 0.3s;
        }
        .btn-submit:hover { background-color: var(--primary-color); }

        /* --- Manage/Delete Gallery Section --- */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;
        }

        .gallery-card {
            background: var(--white); border-radius: 10px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; transition: 0.3s;
        }
        .gallery-card:hover { transform: translateY(-5px); }

        .gallery-card img, .gallery-card video { width: 100%; height: 200px; object-fit: cover; display: block; }
        
        .gallery-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tag { background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        
        .btn-delete {
            background-color: var(--danger); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }
        .btn-delete:hover { background-color: #b02a37; transform: scale(1.1); }

        /* Loader */
        .loader { display: none; text-align: center; margin-top: 15px; color: var(--primary-color); font-weight: 600; }
        .loader i { animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">Royal Events Admin</div>
        <a href="index.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-house"></i> View Website</a>
    </header>

    <div class="dashboard-container">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Media</button>
            <button class="tab-btn" onclick="switchTab('manage')"><i class="fa-solid fa-images"></i> Manage Gallery</button>
        </div>

        <div id="upload" class="tab-content active">
            <div class="upload-card">
                <h2>Add New Memories</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label>Select Category</label>
                        <select name="category" id="category" required>
                            <option value="wedding">Wedding / Marriage</option>
                            <option value="birthday">Birthday Party</option>
                            <option value="video">Video Event</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Upload Files (Multiple)</label>
                        <div class="file-upload-wrapper">
                            <i class="fa-solid fa-file-arrow-up"></i>
                            <p>Click or Drag & Drop Photos/Videos here</p>
                            <input type="file" name="mediaFiles" id="mediaFile" accept="image/*, video/*" multiple required>
                        </div>
                    </div>

                    <div class="preview-container" id="previewContainer">
                        </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Upload to Website</button>
                    <div class="loader" id="uploadLoader"><i class="fa-solid fa-spinner"></i> Uploading... Please wait</div>
                </form>
            </div>
        </div>

        <div id="manage" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--secondary-color);">Manage Website Gallery</h2>
            <p style="margin-bottom: 20px; color: #666;">Here you can view and delete images/videos currently live on your website.</p>
            
            <div class="gallery-grid" id="adminGalleryGrid"></div>
            <div class="loader" id="galleryLoader" style="display: block;"><i class="fa-solid fa-spinner"></i> Fetching Gallery...</div>
        </div>

    </div>

    <script>
        const SERVER_URL = "https://the-royal-events-admin.onrender.com";

        // --- 1. TAB SWITCHING LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(tabId === 'manage') {
                loadGallery();
            }
        }

        // --- 2. MULTI-PREVIEW LOGIC ---
        document.getElementById('mediaFile').addEventListener('change', function(event) {
            const files = event.target.files;
            const previewContainer = document.getElementById('previewContainer');
            
            previewContainer.innerHTML = ''; // Purane previews saaf karo
            previewContainer.style.display = 'flex';

            if (files.length > 0) {
                Array.from(files).forEach(file => {
                    const url = URL.createObjectURL(file);
                    if (file.type.startsWith('image/')) {
                        const img = document.createElement('img');
                        img.src = url;
                        previewContainer.appendChild(img);
                    } else if (file.type.startsWith('video/')) {
                        const video = document.createElement('video');
                        video.src = url;
                        previewContainer.appendChild(video);
                    }
                });
            }
        });

        // --- 3. MULTI-UPLOAD AJAX LOGIC ---
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('uploadLoader');
            const fileInput = document.getElementById('mediaFile');
            const category = document.getElementById('category').value;

            // NAYA: FormData manually banana padega multiple files ke liye
            const formData = new FormData();
            formData.append('category', category);
            
            // Sabhi files ko loop karke add karo
            Array.from(fileInput.files).forEach(file => {
                formData.append('mediaFiles', file);
            });

            submitBtn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if(data.success) {
                    alert(`✅ Done! ${fileInput.files.length} items uploaded successfully.`);
                    this.reset();
                    document.getElementById('previewContainer').style.display = 'none';
                } else {
                    alert("❌ Error: " + data.message);
                }
            } catch (error) {
                alert("❌ Server connection failed!");
                console.error(error);
            } finally {
                submitBtn.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // --- 4. FETCH GALLERY LOGIC ---
        async function loadGallery() {
            const grid = document.getElementById('adminGalleryGrid');
            const loader = document.getElementById('galleryLoader');
            
            grid.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}/media`);
                const data = await response.json();
                loader.style.display = 'none';

                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const isVideo = item.url.match(/\.(mp4|mov|webm)$/i);
                        const mediaTag = isVideo 
                            ? `<video src="${item.url}" controls></video>` 
                            : `<img src="${item.url}" alt="Event">`;

                        grid.innerHTML += `
                            <div class="gallery-card" id="card-${item._id}">
                                ${mediaTag}
                                <div class="gallery-info">
                                    <span class="tag">${item.category}</span>
                                    <button class="btn-delete" title="Delete" onclick="deleteMedia('${item._id}')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">No media uploaded yet.</p>';
                }
            } catch (error) {
                loader.style.display = 'none';
                grid.innerHTML = '<p style="text-align:center; color:red;">Failed to connect to server.</p>';
            }
        }

        // --- 5. DELETE MEDIA LOGIC ---
        async function deleteMedia(id) {
            if(!confirm("Humesha ke liye delete kar dein?")) return;

            try {
                const response = await fetch(`${SERVER_URL}/delete/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if(data.success) {
                    document.getElementById(`card-${id}`).remove();
                    alert("🗑️ Item Deleted!");
                } else {
                    alert("❌ Delete fail ho gaya.");
                }
            } catch (error) {
                alert("❌ Server connection error!");
            }
        }
    </script>
</body>
</html>
