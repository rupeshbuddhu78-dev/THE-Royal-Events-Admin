<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Royal Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #1a1a2e;
            --bg-color: #f0f2f5;
            --text-dark: #333;
            --white: #ffffff;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* --- Sidebar & Header --- */
        header {
            background-color: var(--secondary-color);
            color: var(--white);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* --- Dashboard Layout --- */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--white);
            border: 2px solid transparent;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: var(--secondary-color);
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }

        /* --- Tab Content Sections --- */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Upload Section Style --- */
        .upload-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
        }

        .upload-card h2 { color: var(--secondary-color); margin-bottom: 25px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 8px; color: #555; }
        
        select, input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; outline: none; font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
        }

        .file-upload-wrapper {
            position: relative; border: 2px dashed #ccc; border-radius: 10px;
            padding: 30px; text-align: center; background: #fafafa; transition: 0.3s;
        }
        .file-upload-wrapper:hover { border-color: var(--primary-color); }
        .file-upload-wrapper input[type="file"] {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .file-upload-wrapper i { font-size: 40px; color: var(--primary-color); margin-bottom: 10px; }

        .preview-container {
            margin-top: 20px; text-align: center; display: none;
        }
        .preview-container img, .preview-container video {
            max-width: 100%; max-height: 300px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-submit {
            background-color: var(--secondary-color); color: var(--white); font-weight: bold;
            padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer;
            font-size: 16px; margin-top: 20px; transition: 0.3s;
        }
        .btn-submit:hover { background-color: var(--primary-color); }

        /* --- Manage/Delete Gallery Section --- */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;
        }

        .gallery-card {
            background: var(--white); border-radius: 10px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; transition: 0.3s;
        }
        .gallery-card:hover { transform: translateY(-5px); }

        .gallery-card img, .gallery-card video { width: 100%; height: 200px; object-fit: cover; display: block; }
        
        .gallery-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tag { background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        
        .btn-delete {
            background-color: var(--danger); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }
        .btn-delete:hover { background-color: #b02a37; transform: scale(1.1); }

        /* Loader */
        .loader { display: none; text-align: center; margin-top: 15px; color: var(--primary-color); font-weight: 600; }
        .loader i { animation: spin 1s linear infinite; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">Royal Events Admin</div>
        <a href="index.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-house"></i> View Website</a>
    </header>

    <div class="dashboard-container">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Media</button>
            <button class="tab-btn" onclick="switchTab('manage')"><i class="fa-solid fa-images"></i> Manage Gallery</button>
        </div>

        <div id="upload" class="tab-content active">
            <div class="upload-card">
                <h2>Add New Memory</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label>Select Category</label>
                        <select name="category" id="category" required>
                            <option value="wedding">Wedding / Marriage</option>
                            <option value="birthday">Birthday Party</option>
                            <option value="video">Video Event</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Upload File</label>
                        <div class="file-upload-wrapper">
                            <i class="fa-solid fa-file-arrow-up"></i>
                            <p>Click or Drag & Drop Photo/Video here</p>
                            <input type="file" name="mediaFile" id="mediaFile" accept="image/*, video/*" required>
                        </div>
                    </div>

                    <div class="preview-container" id="previewContainer">
                        <img id="imagePreview" style="display: none;" alt="Preview">
                        <video id="videoPreview" controls style="display: none;"></video>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Upload to Website</button>
                    <div class="loader" id="uploadLoader"><i class="fa-solid fa-spinner"></i> Uploading... Please wait</div>
                </form>
            </div>
        </div>

        <div id="manage" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--secondary-color);">Manage Website Gallery</h2>
            <p style="margin-bottom: 20px; color: #666;">Here you can view and delete images/videos currently live on your website.</p>
            
            <div class="gallery-grid" id="adminGalleryGrid">
                <div class="gallery-card">
                    <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?q=80&w=400" alt="Sample">
                    <div class="gallery-info">
                        <span class="tag">Wedding</span>
                        <button class="btn-delete" title="Delete this item" onclick="deleteMedia('dummy_id')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
            <div class="loader" id="galleryLoader" style="display: block;"><i class="fa-solid fa-spinner"></i> Fetching Gallery...</div>
        </div>

    </div>

    <script>
        const SERVER_URL = "https://the-royal-events-admin.onrender.com";

        // --- 1. TAB SWITCHING LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(tabId === 'manage') {
                loadGallery(); // Manage tab kholte hi server se photos load hongi
            }
        }

        // --- 2. LIVE PREVIEW LOGIC ---
        document.getElementById('mediaFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const previewContainer = document.getElementById('previewContainer');
            const imgPreview = document.getElementById('imagePreview');
            const videoPreview = document.getElementById('videoPreview');

            imgPreview.style.display = 'none';
            videoPreview.style.display = 'none';
            previewContainer.style.display = 'block';

            if (file) {
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('image/')) {
                    imgPreview.src = url;
                    imgPreview.style.display = 'inline-block';
                } else if (file.type.startsWith('video/')) {
                    videoPreview.src = url;
                    videoPreview.style.display = 'inline-block';
                }
            }
        });

        // --- 3. AJAX UPLOAD LOGIC ---
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Page refresh hone se rokna
            
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('uploadLoader');
            const formData = new FormData(this);

            // UI update during upload
            submitBtn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if(data.success) {
                    alert("✅ Media Uploaded Successfully!");
                    this.reset(); // Form clear karna
                    document.getElementById('previewContainer').style.display = 'none';
                } else {
                    alert("❌ Error: " + data.message);
                }
            } catch (error) {
                alert("❌ Server connection failed. Make sure backend is running.");
                console.error(error);
            } finally {
                // UI reset
                submitBtn.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // --- 4. FETCH GALLERY LOGIC (For Manage Tab) ---
        async function loadGallery() {
            const grid = document.getElementById('adminGalleryGrid');
            const loader = document.getElementById('galleryLoader');
            
            grid.innerHTML = ''; // Clear old data
            loader.style.display = 'block';

            try {
                // API Call to get images from database (Backend me banayenge)
                const response = await fetch(`${SERVER_URL}/media`);
                if(!response.ok) throw new Error("Endpoint missing");
                
                const data = await response.json();
                loader.style.display = 'none';

                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        // Generate HTML cards for each photo/video
                        const isVideo = item.url.match(/\.(mp4|mov|webm)$/i);
                        const mediaTag = isVideo 
                            ? `<video src="${item.url}" controls></video>` 
                            : `<img src="${item.url}" alt="Event">`;

                        grid.innerHTML += `
                            <div class="gallery-card" id="card-${item._id}">
                                ${mediaTag}
                                <div class="gallery-info">
                                    <span class="tag">${item.category}</span>
                                    <button class="btn-delete" title="Delete" onclick="deleteMedia('${item._id}')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">No media uploaded yet.</p>';
                }

            } catch (error) {
                loader.style.display = 'none';
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding: 30px; background:#fff; border-radius:10px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:30px; color:#dc3545; margin-bottom:10px;"></i>
                        <p><b>Backend Connection Warning</b></p>
                        <p>Upload is ready, but to view/delete images here, we need to add MongoDB code to your Render backend next!</p>
                    </div>`;
            }
        }

        // --- 5. DELETE MEDIA LOGIC ---
        async function deleteMedia(id) {
            if(!confirm("Are you sure you want to delete this file from your website?")) return;

            try {
                // API Call to delete item (Backend me banayenge)
                const response = await fetch(`${SERVER_URL}/delete/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if(data.success) {
                    document.getElementById(`card-${id}`).remove(); // Remove from UI
                    alert("🗑️ Item Deleted successfully!");
                } else {
                    alert("❌ Error deleting item.");
                }
            } catch (error) {
                alert("❌ Delete feature requires database connection setup in backend.");
            }
        }
    </script>
</body>
</html>
