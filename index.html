<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - The Royal Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .admin-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1a1a2e; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-bottom: 8px; }
        select, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }
        .btn {
            background-color: #d4af37; /* Royal Gold */
            color: #1a1a2e;
            font-weight: bold;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #1a1a2e; color: #d4af37; }
        .preview { margin-top: 15px; max-width: 100%; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Upload New Event</h2>
        
        <form id="uploadForm" action="http://localhost:5000/upload" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Event Category</label>
                <select name="category" required>
                    <option value="wedding">Wedding</option>
                    <option value="birthday">Birthday</option>
                    <option value="video">Video</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Photo / Video</label>
                <input type="file" name="mediaFile" id="mediaFile" accept="image/*, video/*" required>
                <img id="imagePreview" class="preview" alt="Preview">
            </div>

            <button type="submit" class="btn">Upload to Gallery</button>
        </form>
    </div>

    <script>
        // Photo select karte hi preview dikhane ke liye
        document.getElementById('mediaFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
